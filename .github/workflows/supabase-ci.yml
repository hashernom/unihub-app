name: Supabase CI

on:
  pull_request:
    branches: [master]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'
      - 'supabase/edge-functions/**'
  push:
    branches: [master]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'
      - 'supabase/edge-functions/**'

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  PROJECT_ID: 'syhxhnisksggxhtbvggu'

jobs:
  migrations:
    name: Validate migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate SQL syntax
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Validating $f..."
            supabase db lint --file "$f"
          done

  edge-functions:
    name: Lint & test Edge Functions
    runs-on: ubuntu-latest
    # Only run if edge-functions directory has actual files
    if: hashFiles('supabase/edge-functions/**/*.ts') != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Lint Edge Functions
        run: deno lint supabase/edge-functions/

      - name: Test Edge Functions
        run: deno test supabase/edge-functions/
