name: Bug Report
description: Reportar un error en la aplicación
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar un error. Por favor completa la siguiente información.

  - type: textarea
    id: description
    attributes:
      label: Descripción
      description: Describe el error de forma clara y concisa.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Pasos detallados para reproducir el error.
      placeholder: |
        1. Ir a '...'
        2. Hacer clic en '...'
        3. Ver el error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
      description: ¿Qué debería ocurrir?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
      description: ¿Qué ocurre en su lugar?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Plataforma
      options:
        - Web (PWA)
        - iOS
        - Android
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Versión de la app
      description: Número de versión (ej. v1.0.0)

  - type: textarea
    id: logs
    attributes:
      label: Logs / capturas de pantalla
      description: Si aplica, adjunta logs de consola o capturas de pantalla.
