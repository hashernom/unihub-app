<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin/classrooms"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isEdit ? 'Editar' : 'Nueva' }} Aula</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-list>
    <ion-list-header>Información del aula</ion-list-header>

    <ion-item>
      <ion-label position="stacked">Nombre <span class="required">*</span></ion-label>
      <ion-input [(ngModel)]="name" placeholder="Ej: A-101"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Edificio</ion-label>
      <ion-input [(ngModel)]="building" placeholder="Ej: Edificio Central"></ion-input>
    </ion-item>

    <ion-item>
      <ion-label position="stacked">Capacidad</ion-label>
      <ion-input type="number" [(ngModel)]="capacity" placeholder="Ej: 30"></ion-input>
    </ion-item>
  </ion-list>

  <div class="form-actions">
    <ion-button expand="block" (click)="save()" [disabled]="saving">
      {{ saving ? 'Guardando...' : (isEdit ? 'Actualizar aula' : 'Crear aula') }}
    </ion-button>
  </div>

  <ion-toast
    [isOpen]="showToast"
    [message]="toastMessage"
    color="primary"
    [duration]="3000"
    (didDismiss)="showToast = false"
  ></ion-toast>
</ion-content>
