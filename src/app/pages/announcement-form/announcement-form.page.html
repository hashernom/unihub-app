<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/admin/announcements"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isEdit ? 'Editar' : 'Nuevo' }} Anuncio</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="stacked">Título *</ion-label>
    <ion-input [(ngModel)]="title" placeholder="Título del anuncio"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Contenido *</ion-label>
    <ion-textarea [(ngModel)]="body" rows="5" placeholder="Contenido del anuncio"></ion-textarea>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Categoría</ion-label>
    <ion-select [(ngModel)]="category">
      <ion-select-option value="general">General</ion-select-option>
      <ion-select-option value="academic">Académico</ion-select-option>
      <ion-select-option value="event">Evento</ion-select-option>
      <ion-select-option value="urgent">Urgente</ion-select-option>
    </ion-select>
  </ion-item>

  <ion-item>
    <ion-label>Fijar (pinned)</ion-label>
    <ion-toggle [(ngModel)]="isPinned" slot="end"></ion-toggle>
  </ion-item>

  <ion-item>
    <ion-label position="stacked">Fecha de expiración</ion-label>
    <ion-datetime [(ngModel)]="expiresAt" displayFormat="DD/MM/YYYY" placeholder="Sin expiración"></ion-datetime>
  </ion-item>

  <div class="form-actions">
    <ion-button expand="block" (click)="save()" [disabled]="saving">
      {{ saving ? 'Guardando...' : (isEdit ? 'Actualizar' : 'Crear') }}
    </ion-button>
  </div>

  <ion-toast
    [isOpen]="showToast"
    [message]="toastMessage"
    [duration]="3000"
    (didDismiss)="showToast = false"
  ></ion-toast>
</ion-content>
