<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Panel Admin</ion-title>
    <ion-buttons slot="end">
      <ion-button routerLink="/profile"><ion-icon slot="icon-only" name="person-circle"></ion-icon></ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding">
  <h1>Administraci&oacute;n</h1>
  <p class="subtitle">Gestiona los m&oacute;dulos de UniHub</p>
  <ion-grid>
    <ion-row>
      @for (card of adminCards; track card.title) {
        <ion-col size="6" size-md="4">
          <ion-card [routerLink]="card.route" class="dashboard-card" [style.--card-color]="'var(--ion-color-' + card.color + ')'">
            <ion-card-header>
              <ion-icon [name]="card.icon" class="card-icon"></ion-icon>
              <ion-card-title>{{ card.title }}</ion-card-title>
            </ion-card-header>
          </ion-card>
        </ion-col>
      }
    </ion-row>
  </ion-grid>
</ion-content>
