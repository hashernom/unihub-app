<ion-header class="ion-hide">
  <ion-toolbar color="primary">
    <ion-title>Nueva contraseña</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="auth-content">
  <div class="auth-container">
    <div class="auth-brand-mark">
      <div class="auth-brand-icon">
        <ion-icon name="key"></ion-icon>
      </div>
      <h1>Nueva contraseña</h1>
      <p class="subtitle">Ingresa tu nueva contraseña para restablecer tu acceso.</p>
    </div>
    <div class="auth-card">
    <form (ngSubmit)="onSubmit()">
      <ion-item class="auth-item">
        <ion-label position="floating">Nueva contraseña</ion-label>
        <ion-input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          autocomplete="new-password"
        ></ion-input>
      </ion-item>

      <ion-item class="auth-item">
        <ion-label position="floating">Confirmar contraseña</ion-label>
        <ion-input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          autocomplete="new-password"
        ></ion-input>
      </ion-item>

      <ion-button
        expand="block"
        type="submit"
        [disabled]="loading"
        class="ion-margin-top auth-submit-btn"
      >
        @if (loading) {
          <ion-spinner slot="start"></ion-spinner>
        }
        {{ loading ? 'Actualizando...' : 'Cambiar contraseña' }}
      </ion-button>
    </form>
    </div>
    <div class="auth-links">
      <a routerLink="/login">Volver a inicio de sesión</a>
    </div>
  </div>

  <ion-toast
    [isOpen]="showToast"
    message="{{ errorMessage }}"
    [duration]="4000"
    color="danger"
    (didDismiss)="showToast = false"
  ></ion-toast>
</ion-content>
