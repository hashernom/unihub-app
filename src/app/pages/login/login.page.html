<ion-header class="ion-hide">
  <ion-toolbar color="primary">
    <ion-title>Iniciar sesión</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="auth-content">
  <div class="auth-container">
    <div class="auth-decoration auth-decoration--circle-1"></div>
    <div class="auth-decoration auth-decoration--circle-2"></div>
    <div class="auth-decoration auth-decoration--diamond auth-decoration--diamond-1"></div>
    <div class="auth-decoration auth-decoration--diamond auth-decoration--diamond-2"></div>
    <div class="auth-brand-mark">
      <div class="auth-brand-icon">
        <ion-icon name="school"></ion-icon>
      </div>
      <h1>UniHub</h1>
      <p class="subtitle">Accede a tu plataforma universitaria</p>
    </div>
    <div class="auth-card">
      <form (ngSubmit)="onLogin()">
      <ion-item class="auth-item">
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" [(ngModel)]="email" name="email" required autocomplete="email"></ion-input>
      </ion-item>
      <ion-item class="auth-item">
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input type="password" [(ngModel)]="password" name="password" required autocomplete="current-password"></ion-input>
      </ion-item>
      <ion-button expand="block" type="submit" [disabled]="loading" class="ion-margin-top auth-submit-btn">
        @if (loading) { <ion-spinner slot="start"></ion-spinner> }
        {{ loading ? "Ingresando..." : "Iniciar sesión" }}
      </ion-button>
    </form>
    </div>
    <div class="auth-links">
      <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
      <a routerLink="/register">¿No tienes cuenta? Regístrate</a>
    </div>
  </div>
  <ion-toast [isOpen]="showToast" message="{{ errorMessage }}" [duration]="3000" color="danger" (didDismiss)="showToast = false"></ion-toast>
</ion-content>
