<ion-card class="announcement-card">
  <ion-card-header>
    <ion-card-title>
    <ion-icon [class.hidden]="!announcement.is_pinned" name="pin" class="pinned-icon"></ion-icon>
    {{ announcement.title }}
    </ion-card-title>
    <div class="card-meta">
      <ion-badge [color]="badgeColor" class="category-badge">
        {{ categoryLabel }}
      </ion-badge>
      <span class="card-date">{{ announcement.created_at | date:'dd/MM/yyyy' }}</span>
    </div>
  </ion-card-header>
  <ion-card-content>
    <p class="card-body">{{ announcement.body }}</p>
  </ion-card-content>
</ion-card>
